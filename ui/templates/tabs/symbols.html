{% from 'components/macros.html' import loading_state %}

        <div id="tab-symbols" class="tab-content p-4">
            <!-- Toolbar -->
            <div class="flex flex-wrap items-center gap-3 mb-4">
                <h2 class="text-xl font-bold flex-1">Symbols</h2>
                <!-- Pro-grade filter row -->
                <div class="flex items-center gap-2 flex-wrap">
                    <select id="sym-regime-filter" onchange="renderSymbolCardsFromCache()"
                            class="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs">
                        <option value="all">All Regimes</option>
                        <option value="bull">🟢 Bull</option>
                        <option value="bear">🔴 Bear</option>
                        <option value="sideways">🟡 Sideways</option>
                    </select>
                    <select id="sym-trust-filter" onchange="renderSymbolCardsFromCache()"
                            class="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs">
                        <option value="0">All Trust</option>
                        <option value="50">50%+</option>
                        <option value="70">70%+</option>
                    </select>
                    <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer select-none">
                        <input type="checkbox" id="hide-zeros-toggle" checked onchange="renderSymbolCardsFromCache()"
                               class="w-3.5 h-3.5 accent-blue-500">
                        Hide no-data
                    </label>
                    <button onclick="runFullCycle(this)"
                            class="px-3 py-1.5 bg-purple-700 hover:bg-purple-600 rounded-lg text-xs font-semibold whitespace-nowrap">
                        ⚡ Full Cycle
                    </button>
                </div>
            </div>
            <!-- Symbol Cards Grid — cards enhanced with pro-grade badges -->
            <div id="symbols-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Cards will be generated here by renderSymbolCardsFromCache() -->
                {{ loading_state('Loading symbols...') }}
            </div>
        </div>
