{#
  activity_card.html — System activity status card shown on the Portfolio page.
  Populated by loadSystemActivity() in portfolio.js
#}
<div class="symbol-card p-3">
    <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
            <span class="text-base">⚙️</span>
            <span class="text-sm font-semibold text-gray-300">System Activity</span>
        </div>
        <span id="system-activity-status" class="text-xs text-gray-500">● Loading</span>
    </div>
    <div class="grid grid-cols-2 gap-x-4 gap-y-2 text-xs">
        <div class="flex justify-between">
            <span class="text-gray-500">Last Candle</span>
            <span id="activity-last-candles" class="text-white font-semibold">--</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500">Last Signal</span>
            <span id="activity-last-signal" class="text-white font-semibold">--</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500">Active Signals</span>
            <span id="activity-active-signals" class="text-green-400 font-semibold">--</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500">Last Trade</span>
            <span id="activity-last-trade" class="text-white font-semibold">--</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500">Ensemble Trades</span>
            <span id="activity-ensemble-trades" class="text-purple-400 font-semibold">--</span>
        </div>
        <div class="flex justify-between">
            <span class="text-gray-500">Strategy Trades</span>
            <span id="activity-strategy-trades" class="text-blue-400 font-semibold">--</span>
        </div>
        <div class="flex justify-between col-span-2">
            <span class="text-gray-500">Workers</span>
            <span id="activity-workers" class="text-white font-semibold">--</span>
        </div>
    </div>
</div>
